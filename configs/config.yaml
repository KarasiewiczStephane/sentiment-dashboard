database:
  duckdb_path: "data/sentiment.duckdb"
  batch_size: 1000

model:
  roberta_model_name: "roberta-base"
  max_length: 128
  num_labels: 3

training:
  epochs: 3
  learning_rate: 2.0e-5
  batch_size: 16
  early_stopping_patience: 2
  warmup_ratio: 0.1
  use_class_weights: true

dashboard:
  refresh_interval: 30
  port: 8050

api:
  host: "0.0.0.0"
  port: 8000

simulator:
  tweets_per_second: 5.0

preprocessing:
  min_length: 10
  max_length: 280

topic_modeling:
  embedding_model: "all-MiniLM-L6-v2"
  min_topic_size: 10
  n_representative_words: 5

trend_detection:
  z_threshold: 2.0
  min_samples: 30
  window_size: 7
